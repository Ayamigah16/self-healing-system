name: Terraform CI/CD — TechStream Self-Healing

on:
  push:
    branches: [main]
    paths: ['terraform/**', 'lambda/**', 'app/**']
  pull_request:
    branches: [main]
    paths: ['terraform/**', 'lambda/**', 'app/**']
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write   # OIDC for AWS auth
  contents: read
  pull-requests: write

env:
  TF_VERSION:     "1.8.4"
  PYTHON_VERSION: "3.12"
  AWS_REGION:     "eu-west-1"
  TF_DIR:         "terraform"
  # Terraform variable overrides — non-sensitive values inline, sensitive via secrets
  TF_VAR_aws_region:         "eu-west-1"
  TF_VAR_availability_zones: '["eu-west-1a","eu-west-1b","eu-west-1c"]'
  TF_VAR_alert_email:        ${{ secrets.TF_ALERT_EMAIL }}

jobs:
  # ─── Validate ───────────────────────────────────────────────────────────────
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform -chdir=$TF_DIR fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform -chdir=$TF_DIR init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=$TF_DIR validate

      - name: Python Lambda Lint
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install pyflakes --quiet
          pyflakes lambda/remediation/handler.py
          pyflakes lambda/rca-analysis/handler.py
          pyflakes app/server.py

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: tfsec — Terraform Security Scanner
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: checkov — IaC Misconfiguration Scanner
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: true
          output_format: sarif
          output_file_path: checkov.sarif

  # ─── Terraform Plan ─────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, security]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Package Lambda functions
        run: |
          cd lambda/remediation  && zip -qr remediation.zip  . -x "*.pyc" -x "__pycache__/*" && cd -
          cd lambda/rca-analysis && zip -qr rca-analysis.zip . -x "*.pyc" -x "__pycache__/*" && cd -

      - name: Terraform Init
        run: terraform -chdir=$TF_DIR init

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=$TF_DIR plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8').slice(0, 65000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${plan}\n\`\`\``
            });

      - name: Upload plan artefact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

  # ─── Terraform Apply (main branch only) ─────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'apply')
    environment:
      name: prod
      url: ${{ steps.outputs.outputs.alb_url }}
    concurrency:
      group: terraform-apply
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Package Lambda functions
        run: |
          cd lambda/remediation  && zip -qr remediation.zip  . -x "*.pyc" -x "__pycache__/*" && cd -
          cd lambda/rca-analysis && zip -qr rca-analysis.zip . -x "*.pyc" -x "__pycache__/*" && cd -

      - name: Download plan artefact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Terraform Init
        run: terraform -chdir=$TF_DIR init

      - name: Terraform Apply
        run: terraform -chdir=$TF_DIR apply -auto-approve tfplan

      - name: Capture Outputs
        id: outputs
        run: |
          echo "alb_url=$(terraform -chdir=$TF_DIR output -raw alb_url)" >> $GITHUB_OUTPUT
          echo "dashboard=$(terraform -chdir=$TF_DIR output -raw cloudwatch_dashboard_url)" >> $GITHUB_OUTPUT

      - name: Run Verification
        run: ./scripts/verify.sh --alb-url ${{ steps.outputs.outputs.alb_url }} --region ${{ env.AWS_REGION }}
